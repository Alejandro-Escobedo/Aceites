<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reporte de Inventario</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background:
                    linear-gradient(rgba(255,255,255,0.93), rgba(255,255,255,0.93)),
                    url('/img/logo.jfif');
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            background: rgba(255,255,255,0.96);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #2f4159;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo {
            width: 110px;
        }

        h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 38px;
        }

        .info {
            margin-top: 10px;
            font-size: 17px;
            color: #444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #2f4159;
            color: white;
            padding: 12px;
            font-size: 17px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 15px;
        }

        tr:nth-child(even) {
            background-color: #f7f7f7;
        }

        tr:hover {
            background-color: #dfefff;
        }

        /* ESTADOS */

        .falta {
            background-color: #ffdddd;
            color: #c0392b;
            font-weight: bold;
        }

        .sobra {
            background-color: #ddffdd;
            color: #27ae60;
            font-weight: bold;
        }

        .igual {
            background-color: #ddeaff;
            color: #2980b9;
            font-weight: bold;
        }

        /* BOTONES */

        .acciones{
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
        }

        .btn:hover {
            background-color: #1e8449;
        }

        .fechaInput{
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #999;
            font-size: 15px;
        }

        /* FIRMAS */

        .firmas{
            margin-top: 120px;
            display: flex;
            justify-content: center;
            gap: 120px;
        }

        .firma{
            width: 250px;
            text-align: center;
        }

        /* IMPRESION */

        @media print {

            body{
                background: white;
                zoom: 92%;
            }

            .container{
                box-shadow: none;
            }

            .acciones{
                display:none;
            }

            .logo{
                width: 90px;
            }

            h1{
                font-size: 30px;
            }

            th{
                font-size: 14px;
                padding: 8px;
            }

            td{
                font-size: 12px;
                padding: 6px;
            }

            .firmas{
                margin-top: 160px;
                gap: 80px;
            }

            /* OCULTAR FECHA NAVEGADOR */
            @page{
                margin: 10mm;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <!-- ENCABEZADO -->
    <div class="header">

        <div>

            <h1>Reporte de Inventario</h1>

            <div class="info">

                Fecha:
                <span th:text="${#temporals.format(#temporals.createNow(),'dd/MM/yyyy')}"></span>

            </div>

        </div>

        <img src="/img/logo.jfif" class="logo">

    </div>

    <!-- TABLA -->
    <table>

        <tr>

            <th>Codigo</th>
            <th>Descripcion</th>
            <th>Stock Sistema</th>
            <th>Stock Fisico</th>
            <th>Diferencia</th>
            <th>Estado</th>

            <!-- SOLO ADMIN -->
            <th th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                Acciones
            </th>

        </tr>

        <tr th:each="inv : ${inventarios}">

            <td th:text="${inv.producto.codigo}"></td>

            <td th:text="${inv.producto.descripcion}"></td>

            <td th:text="${inv.stockSistema}"></td>

            <td th:text="${inv.stockFisico}"></td>

            <td th:text="${inv.diferencia}"></td>

            <!-- ESTADO -->
            <td th:text="${inv.estado}"
                th:classappend="
                    ${inv.estado == 'Falta'} ? 'falta' :
                    (${inv.estado == 'Sobra'} ? 'sobra' : 'igual')
                ">
            </td>

            <!-- EDITAR ADMIN -->
            <td th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

                <a th:href="@{'/editar/' + ${inv.id}}"

                   style="
                   background:#f39c12;
                   color:white;
                   padding:8px 15px;
                   border-radius:6px;
                   text-decoration:none;
                   ">

                    Editar

                </a>

            </td>

        </tr>

    </table>

    <!-- BOTONES -->
    <div class="acciones">

        <!-- IMPRIMIR -->
        <button class="btn"
                onclick="window.print()">

            Imprimir

        </button>

        <!-- FECHA -->
        <input type="date"
               id="fechaReporte"
               class="fechaInput">

        <!-- REPORTE -->
        <button class="btn"
                onclick="abrirReporteFecha()">

            📅 Ver Reporte

        </button>

    </div>

    <!-- FIRMAS -->
    <div class="firmas">

        <div class="firma">

            <p>______________________</p>

        </div>

        <div class="firma">

            <p>______________________</p>

        </div>

    </div>

</div>

<script>

    function abrirReporteFecha(){

        let fecha =
            document.getElementById("fechaReporte").value;

        if(fecha == ""){

            window.location.href = "/reporte";
            return;
        }

        window.location.href =
            "/reporte?fecha=" + fecha;
    }

</script>

</body>

</html>
