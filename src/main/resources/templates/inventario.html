<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventario</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            height: 60px;
        }

        h2 {
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background-color: #3498db;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        input {
            width: 80px;
            padding: 5px;
            text-align: center;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #219150;
        }

        @media print {
            .btn {
                display: none;
            }
        }
    </style>
</head>

<body>

<div style="text-align:center; margin-bottom:20px;">
    <img src="/img/logo.jfif" width="150">
</div>

<h2>Inventario de Aceites</h2>
        <!-- LOGO -->
<img src="/img/fotowilly.jpeg" width="100">
    </div>

    <form action="/guardar" method="post">

        <table>
            <tr>
                <th>Codigo</th>
                <th>Descripcion</th>
                <th>Stock Fisico</th>
            </tr>

            <tr th:each="p : ${productos}">
                <td th:text="${p.codigo}"></td>
                <td th:text="${p.descripcion}"></td>

                <input type="hidden" name="id" th:value="${p.id}" />

                <td>
                    <input type="number" step="0.01" name="stockFisico" required>
                </td>
            </tr>

        </table>

        <button class="btn" type="submit">Guardar</button>

    </form>

</div>

</body>
</html>
