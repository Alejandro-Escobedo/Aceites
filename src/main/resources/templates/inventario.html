<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Inventario de Aceites</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background:
                    linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
                    url('/img/logo.jfif');
            background-size: cover;
            background-attachment: fixed;
        }

        .header {
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.08);
        }

        h1 {
            color: #2c3e50;
            font-size: 50px;
            margin: 10px 0;
        }

        .container {
            width: 97%;
            margin: auto;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #2f4159;
            color: white;
            padding: 12px;
            font-size: 18px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f4f4f4;
        }

        tr:hover {
            background-color: #dfefff;
        }

        input {
            width: 80px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #999;
            text-align: center;
            font-size: 15px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: #1e8449;
        }

        .logout-btn {
            background:#c0392b;
            color:white;
            padding:10px 15px;
            border-radius:8px;
            text-decoration:none;
        }

        .logout-btn:hover{
            background:#922b21;
        }

        .popup {
            display: none;
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
            width: 200px;
        }

        .popup button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .popup button:hover {
            background: #217dbb;
        }

        @media print {
            .btn {
                display: none;
            }
        }

    </style>

</head>

<body>

<div class="header">

    <img src="/img/logo.jfif"
         class="logo"
         onclick="abrirPopup()">

    <h1>Inventario de Aceites</h1>

</div>

<!-- USUARIO -->
<div style="
        width:97%;
        margin:auto;
        margin-bottom:15px;
        background:white;
        padding:10px;
        border-radius:10px;
        display:flex;
        justify-content:space-between;
        align-items:center;
">

    <div>
        Usuario:
        <b th:text="${#authentication.name}"></b>
    </div>

    <div>

        <!-- ADMIN -->
        <span th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
            Rol: <b>Admin de admin</b>
        </span>

        <!-- OPERADOR -->
        <span th:if="${#authorization.expression('hasRole(''OPERADOR'')')}">
            Rol: <b>Operador</b>
        </span>

        <!-- VISOR -->
        <span th:if="${#authorization.expression('hasRole(''VISOR'')')}">
            Rol: <b>Visor</b>
        </span>

    </div>

    <a href="/logout" class="logout-btn">
        Cerrar sesión
    </a>

</div>

<div class="container">

    <form action="/guardar" method="post">

        <table>

            <tr>
                <th>Codigo</th>
                <th>Descripcion</th>
                <th>Stock Sistema</th>
                <th>Stock Fisico</th>
            </tr>

            <tr th:each="p : ${productos}">

                <td th:text="${p.codigo}"></td>

                <td th:text="${p.descripcion}"></td>

                <input type="hidden"
                       name="id"
                       th:value="${p.id}" />

                <!-- STOCK SISTEMA -->
                <td>

                    <!-- ADMIN EDITA -->
                    <input type="number"
                           step="0.01"
                           name="stockSistema"
                           th:value="${p.stockSistema}"

                           th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

                    <!-- OPERADOR Y VISOR SOLO VEN -->
                    <span th:if="${!#authorization.expression('hasRole(''ADMIN'')')}"
                          th:text="${p.stockSistema}">
                    </span>

                </td>

                <!-- STOCK FISICO -->
                <td>

                    <!-- ADMIN Y OPERADOR -->
                    <input type="number"
                           step="0.01"
                           name="stockFisico"

                           th:if="${!#authorization.expression('hasRole(''VISOR'')')}">

                    <!-- VISOR SOLO VE -->
                    <span th:if="${#authorization.expression('hasRole(''VISOR'')')}">
                        🔒
                    </span>

                </td>

            </tr>

        </table>

        <!-- BOTON GUARDAR -->
        <button class="btn"
                type="submit"

                th:if="${!#authorization.expression('hasRole(''VISOR'')')}">

            Guardar
            <img src="/img/fotowilly.jpeg" width="10">
        </button>

        <!-- BOTON REPORTE
        <a href="/reporte"
           class="btn">

            Ver Reporte

        </a>-->

        <!-- REPORTE POR FECHA -->
        <div style="margin-top:20px;">

            <input type="date"
                   id="fechaReporte"
                   style="
                   padding:10px;
                   border-radius:8px;
                   border:1px solid #999;
                   ">

            <button type="button"
                    class="btn"
                    onclick="abrirReporteFecha()">

                📅  Ver Reporte

            </button>

        </div>

    </form>

</div>

<div class="popup" id="popup">

    <h2>Inventario</h2>

    <p>Version 1</p>

    <p>En construccion</p>

    <p>- Login</p>
    <p>- Menu</p>
    <p>- Reporte mensual</p>

    <button onclick="cerrarPopup()">
        Salir
    </button>

</div>

<script>

    function abrirPopup() {
        document.getElementById("popup").style.display = "block";
    }

    function cerrarPopup() {
        document.getElementById("popup").style.display = "none";
    }

    function abrirReporteFecha(){

        let fecha =
            document.getElementById("fechaReporte").value;

        if(fecha == ""){

            window.location.href = "/reporte";
            return;
        }

        window.location.href =
            "/reporte?fecha=" + fecha;
    }

</script>

</body>
</html>
