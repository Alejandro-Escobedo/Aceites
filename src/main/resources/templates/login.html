<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Inventario</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    linear-gradient(rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)),

                    url('/img/fondologin.png');

            background-size:cover;
            background-position:center;
        }

        .login-box{

            width:400px;

            background:rgba(5,25,55,0.88);

            padding:40px;

            border-radius:20px;

            position:relative;

            box-shadow:
                    0 0 25px rgba(0,0,0,0.5);

            backdrop-filter: blur(5px);
        }

        .logo-container{

            position:absolute;

            top:-55px;
            left:50%;

            transform:translateX(-50%);

            width:110px;
            height:110px;

            background:white;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            box-shadow:
                    0 0 20px rgba(255,255,255,0.8);
        }

        .logo-container img{

            width:75px;
        }

        h1{

            color:white;

            text-align:center;

            margin-top:40px;
            margin-bottom:40px;

            font-size:55px;
        }

        label{

            color:white;

            display:block;

            margin-bottom:8px;

            font-size:22px;
        }

        input{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            margin-bottom:20px;

            font-size:18px;
        }

        input:focus{

            outline:none;

            box-shadow:
                    0 0 10px #2ecc71;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#43c02a;

            color:white;

            font-size:22px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#35a51f;

            transform:scale(1.02);
        }

        .error{

            color:#ff7675;

            text-align:center;

            margin-bottom:15px;

            font-size:16px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="logo-container">

        <img src="/img/logo.jfif">

    </div>

    <h1>
        Inventario de Aceites
    </h1>

    <!-- ERROR LOGIN -->
    <div class="error"
         th:if="${param.error}">

        Usuario o contraseña incorrectos

    </div>

    <form th:action="@{/login}" method="post">

        <label>Usuario</label>

        <input type="text"
               name="username"
               required>

        <label>Contraseña</label>

        <input type="password"
               name="password"
               required>

        <button type="submit">

            Ingresar

        </button>

    </form>

</div>

</body>
</html>
