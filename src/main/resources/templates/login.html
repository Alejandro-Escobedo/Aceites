<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - Inventario</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;

            background:
                    linear-gradient(rgba(255,255,255,0.4),
                    rgba(255,255,255,0.4)),
                    url('/img/fondo-login.jpg');

            background-size:cover;
            background-position:center;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{

            width:400px;

            background:rgba(25,70,120,0.90);

            padding:30px;

            border-radius:15px;

            box-shadow:0 0 20px rgba(0,0,0,0.4);

            text-align:center;

            color:white;
        }

        .logo{

            width:120px;

            margin-top:-90px;

            margin-bottom:10px;

            background:white;

            border-radius:100px;

            padding:10px;

            box-shadow:0 0 10px rgba(0,0,0,0.4);
        }

        h1{

            margin-bottom:30px;

            font-size:50px;
        }

        .input-box{

            text-align:left;

            margin-bottom:20px;
        }

        .input-box label{

            display:block;

            margin-bottom:8px;

            font-size:20px;
        }

        .input-box input{

            width:100%;

            padding:14px;

            border:none;

            border-radius:8px;

            font-size:18px;

            box-sizing:border-box;
        }

        .btn{

            width:100%;

            padding:14px;

            background:#0d6efd;

            color:white;

            border:none;

            border-radius:8px;

            font-size:22px;

            cursor:pointer;

            transition:0.3s;
        }

        .btn:hover{

            background:#0b5ed7;
        }

        .error{

            background:#dc3545;

            padding:10px;

            border-radius:8px;

            margin-bottom:15px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <img src="/img/logo.jfif" class="logo">

    <h1>Inventario de Aceites</h1>

    <div th:if="${param.error}" class="error">

        Usuario o contraseña incorrectos

    </div>

    <form th:action="@{/login}" method="post">

        <div class="input-box">

            <label>Usuario</label>

            <input type="text"
                   name="username"
                   required>

        </div>

        <div class="input-box">

            <label>Contraseña</label>

            <input type="password"
                   name="password"
                   required>

        </div>

        <button class="btn" type="submit">

            Ingresar

        </button>

    </form>

</div>

</body>

</html>
